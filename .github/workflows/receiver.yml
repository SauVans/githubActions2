name: Receiver Workflow

on:
  repository_dispatch:
    types: [githubActions-release-published, githubActions-release]

permissions: write-all

jobs:
  receiver:
    runs-on: ubuntu-latest
    steps:
      - name: Log event payload
        run: |
          echo 'Received event payload: ${{ github.event.client_payload.ort_release_branch }}'